<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondlink Server - Professional Dashboard</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <svg class="logo" width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect x="8" y="8" width="32" height="32" stroke="currentColor" stroke-width="2.5" rx="4"/>
                    <circle cx="24" cy="24" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
                    <line x1="24" y1="8" x2="24" y2="16" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="24" y1="32" x2="24" y2="40" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="8" y1="24" x2="16" y2="24" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="32" y1="24" x2="40" y2="24" stroke="currentColor" stroke-width="2.5"/>
                </svg>
                <h1>Bondlink Server</h1>
            </div>
            <div class="header-right">
                <div class="status-badge connected" id="serverStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Running</span>
                </div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <!-- Server Statistics -->
            <section class="dashboard-section">
                <div class="bonding-info">
                    <div class="bonding-info-item">
                        <div class="bonding-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2"/>
                                <circle cx="9" cy="7" r="4" stroke-width="2"/>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="bonding-details">
                            <h4>Total Clients</h4>
                            <div class="value" id="totalClients">0</div>
                        </div>
                    </div>
                    <div class="bonding-info-item">
                        <div class="bonding-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                                <polyline points="12 6 12 12 16 14" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="bonding-details">
                            <h4>Active Clients</h4>
                            <div class="value" id="activeClients">0</div>
                        </div>
                    </div>
                    <div class="bonding-info-item">
                        <div class="bonding-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke-width="2"/>
                                <path d="M2 17L12 22L22 17M2 12L12 17L22 12" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="bonding-details">
                            <h4>Total Tunnels</h4>
                            <div class="value" id="totalTunnels">0</div>
                        </div>
                    </div>
                    <div class="bonding-info-item">
                        <div class="bonding-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="bonding-details">
                            <h4>Routed Packets</h4>
                            <div class="value" id="routedPackets">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Connected Clients Grid -->
            <section class="dashboard-section">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">Connected Clients</h2>
                        <p class="section-subtitle">Monitor all connected Bondlink routers</p>
                    </div>
                </div>
                <div class="interfaces-grid" id="clientsGrid">
                    <!-- Client cards will be dynamically inserted here -->
                </div>
            </section>

            <!-- Server Bandwidth Overview -->
            <section class="dashboard-section">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">Server Bandwidth</h2>
                        <p class="section-subtitle">Total aggregated throughput</p>
                    </div>
                </div>
                <div class="bandwidth-overview">
                    <div class="bandwidth-card">
                        <div class="bandwidth-header">
                            <h3>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
                                    <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Upload Speed
                            </h3>
                            <div class="bandwidth-rate upload">
                                <span id="serverUpload">0.00</span> Mbps
                            </div>
                        </div>
                        <canvas id="uploadGraph" width="400" height="80"></canvas>
                    </div>
                    
                    <div class="bandwidth-card">
                        <div class="bandwidth-header">
                            <h3>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
                                    <path d="M12 5V19M12 19L19 12M12 19L5 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Download Speed
                            </h3>
                            <div class="bandwidth-rate">
                                <span id="serverDownload">0.00</span> Mbps
                            </div>
                        </div>
                        <canvas id="downloadGraph" width="400" height="80"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
